# Site Information
title: Hr00
description: "Hr00 的个人博客，技术小白，拥抱 AI，记录自己的生活和学习的笔记，以及当下的思考。"
url: https://www.byhaoran.cn
repo: zhang159-a/tw93.github.io
lang: zh-CN
encoding: utf-8
timezone: Asia/Shanghai

# Author Information (for SEO and AI crawlers)
author:
  name: Hr00
  email: 1397543194z@gmail.com
  url: https://www.byhaoran.cn
  github: zhang159-a

# Social Media and External URLs
github: zhang159-a
menu:
  - title: "GitHub"
    url: "https://github.com/zhang159-a"
  - title: "Weekly"
    url: "/weekly/"
  - title: "About"
    url: "/about.html"

# Build Settings
paginate: 10
post_ext: md
page_ext: md
post_layout: post
page_layout: page
titlecase: true
future: true
highlighter: rouge
markdown: kramdown
permalink: /:year-:month-:day/:title.html
sass:
  sass_dir: _sass
  style: compressed

webrick:
  headers:
    "Access-Control-Allow-Origin": "*"
    "Access-Control-Allow-Methods": "GET, OPTIONS"
    "Access-Control-Allow-Headers": "Content-Type, X-Requested-With"

collections:
  posts:
    output: true
    permalink: /:year-:month-:day/:title.html
  weekly:
    output: true
    permalink: /weekly/:name/
    sort_by: issue
include: [".htaccess", "robots.txt"]
exclude:
  [
    "Gemfile",
    "Gemfile.lock",
    "README.md",
    "AGENTS.md",
    "LICENSE",
    "package.json",
    "package-lock.json",
    "vercel.json",
    "giscus.json",
    "node_modules",
    "SEO_GUIDE.md",
    "CLAUDE.md",
  ]

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-pdf-embed
  - jekyll-sitemap
  - jekyll-feed

# Sitemap Settings
defaults:
  - scope:
      path: "images/**/*"
    values:
      sitemap: false
  - scope:
      path: "js/**/*"
    values:
      sitemap: false
  - scope:
      path: "css/**/*"
    values:
      sitemap: false
  - scope:
      path: "_sass/**/*"
    values:
      sitemap: false
  - scope:
      path: ""
      type: "posts"
    values:
      sitemap:
        priority: 0.8
        changefreq: weekly
  - scope:
      path: ""
      type: "weekly"
    values:
      layout: weekly
      sitemap:
        priority: 0.7
        changefreq: weekly
  - scope:
      path: ""
      type: "pages"
    values:
      sitemap:
        priority: 0.6
        changefreq: monthly

# Custom Site Settings
showBuyCoffee: false
defaultImage: data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==

# Comments stay disabled until this fork has its own Giscus repository IDs.
giscus:
  enabled: false
  repo_id: ""
  category_id: ""
