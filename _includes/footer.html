<script>window.ASSET_VERSION = '{{ site.asset_version }}';</script>
<script src="{{ '/js/index.js' | relative_url }}?v={{ site.asset_version }}" defer></script>
<script src="{{ '/js/search.js' | relative_url }}?v={{ site.asset_version }}" defer></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }

  document.addEventListener('DOMContentLoaded', () => {
    Array.from(document.links).forEach((link) => {
      if (link.hostname !== window.location.hostname || link.href.includes('feed.xml')) {
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
      }
    });

    document.querySelectorAll('.entry-content img').forEach((image, index) => {
      if (index > 1) {
        image.loading = 'lazy';
        image.decoding = 'async';
      }
    });

    const fullscreenButton = document.getElementById('fullscreenBtn');
    fullscreenButton?.addEventListener('click', () => {
      const frame = document.getElementById('postIframe');
      if (!document.fullscreenElement) {
        frame?.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
  });
</script>
